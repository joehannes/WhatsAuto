name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # ClojureScript build
  # ============================================================
  cljs-build:
    name: Build ClojureScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (for Clojure toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest

      - name: Build ClojureScript (release)
        run: npx shadow-cljs release app

      - name: Upload JS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cljs-dist
          path: dist/js/

  # ============================================================
  # Node.js sidecar
  # ============================================================
  node-sidecar:
    name: Validate Node sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install sidecar dependencies
        working-directory: src-node
        run: npm ci

      - name: Syntax check
        working-directory: src-node
        run: node --check src/index.js

  # ============================================================
  # Rust build & test
  # ============================================================
  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --all

  # ============================================================
  # Full Tauri build (Linux)
  # ============================================================
  tauri-build:
    name: Tauri build (Linux)
    runs-on: ubuntu-latest
    needs: [cljs-build, node-sidecar, rust-check]
    steps:
      - uses: actions/checkout@v4

      - name: Download CLJS artifact
        uses: actions/download-artifact@v4
        with:
          name: cljs-dist
          path: dist/js/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri app
        run: npx tauri build --bundles deb
        env:
          CI: true
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: whatsauto-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
